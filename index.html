function readProgress(key){
  if(!key) return null;

  try{
    const raw = localStorage.getItem(key);
    if(!raw) return null;

    const data = JSON.parse(raw);

    if(data.answers && typeof data.answers === "object"){
      const answered = Object.keys(data.answers).length;
      const total = data.totalQuestions || data.quizTotal || 0;
      return {answered, total};
    }

    if(data.quizSubmitted && typeof data.quizSubmitted === "object"){
      const answered = Object.values(data.quizSubmitted).filter(Boolean).length;
      const total = data.totalQuestions || data.quizTotal || 0;
      return {answered, total};
    }

    if(data.quizAnswers && typeof data.quizAnswers === "object"){
      const answered = Object.keys(data.quizAnswers).length;
      const total = data.totalQuestions || data.quizTotal || 0;
      return {answered, total};
    }

    return null;
  }catch(e){
    return null;
  }
}

function renderGrid(){
  const grid = document.getElementById("chapterGrid");
  let totalAnswered = 0;
  let totalQuestions = 0;
  let started = 0;

  grid.innerHTML = chapters.map(ch => {
    const prog = readProgress(ch.key);
    let pct = 0;
    let statusLabel = "not started";
    let statusClass = "";
    let barClass = "";

    if(prog){
      if(prog.answered > 0) started++;

      if(prog.total > 0){
        pct = Math.round((prog.answered / prog.total) * 100);
        totalAnswered += prog.answered;
        totalQuestions += prog.total;

        if(pct >= 100){
          statusLabel = "complete";
          statusClass = "done";
          barClass = "done";
        } else if(pct > 0){
          statusLabel = `${pct}%`;
          statusClass = "partial";
          barClass = "partial";
        }
      } else if(prog.answered > 0){
        statusLabel = "started";
        statusClass = "partial";
        barClass = "partial";
        pct = 20;
      }
    }

    const cardClass = pct >= 100 ? "complete" : (pct > 0 ? "in-progress" : "");

    return `<a class="chapter-card ${cardClass}" href="${ch.file}">
      <div class="ch-row1">
        <span class="ch-num">Ch. ${ch.n} · ${ch.roman}</span>
        <span class="ch-status ${statusClass}">${statusLabel}</span>
      </div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-desc">${ch.desc}</div>
      <div class="ch-progress">
        <div class="ch-pbar"><div class="ch-pfill ${barClass}" style="width:${pct}%"></div></div>
        <span>${prog && prog.total > 0 ? `${prog.answered}/${prog.total}` : "—"}</span>
      </div>
    </a>`;
  }).join("");

  const activeChapters = chapters.length;
  const overallPct = totalQuestions ? Math.round((totalAnswered / totalQuestions) * 100) : 0;

  document.getElementById("overallPct").textContent = overallPct + "%";
  document.getElementById("overallFill").style.width = overallPct + "%";

  const questionText = totalQuestions > 0
    ? ` · ${totalAnswered} of ${totalQuestions} questions answered`
    : "";

  document.getElementById("overallDesc").textContent =
    `${started} of ${activeChapters} chapters started${questionText}`;
}

function resetAllProgress(){
  if(!confirm("This will clear all quiz progress and workshop responses across all chapters. Continue?")) return;

  chapters.forEach(ch => {
    if(ch.key) localStorage.removeItem(ch.key);
  });

  renderGrid();
}

renderGrid();

window.addEventListener("focus", renderGrid);
window.addEventListener("pageshow", renderGrid);
</script>
